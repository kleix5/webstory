<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ты перешёл по кнопочке</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        h1 {
            /* Адаптивный размер: минимум 2rem, желательно 8vw от ширины экрана, максимум 6rem */
            font-size: clamp(2rem, 8vw, 6rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.25);
            line-height: 1.2;
        }
    </style>
</head>
<body>
    <h1>ТЫ ПЕРЕШЁЛ ПО КНОПОЧКЕ</h1>
</body>
</html>
